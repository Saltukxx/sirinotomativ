<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#c45c26" />
    <title>Giriş — Şirin Otomotiv</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <style>
      html.auth-pending body {
        visibility: hidden;
      }
      html.auth-ready body {
        visibility: visible;
      }
    </style>
    <script src="js/auth-gate.js"></script>
  </head>
  <body class="login-body">
    <main class="login-shell">
      <section class="login-card panel">
        <p class="brand-name login-brand">ŞİRİN OTOMOTİV</p>
        <p class="brand-sub">Araç Muhasebe Giriş</p>

        <form id="login-form" class="login-form">
          <div class="field">
            <label for="username">Kullanıcı adı</label>
            <input
              id="username"
              name="username"
              required
              autocomplete="username"
              placeholder="Kullanıcı adı"
            />
          </div>
          <div class="field">
            <label for="password">Şifre</label>
            <input
              id="password"
              name="password"
              type="password"
              required
              autocomplete="current-password"
              placeholder="Şifre"
            />
          </div>

          <div id="login-error" class="alert alert-error hidden"></div>

          <button type="submit" class="btn btn-primary btn-block" id="login-btn">
            Giriş yap
          </button>
        </form>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/db.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/login.js"></script>
  </body>
</html>
