<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#c45c26" />
    <title>Şirin Otomotiv — Araç Muhasebe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="header">
      <div class="header-inner">
        <a href="index.html" class="brand">
          <p class="brand-name">ŞİRİN OTOMOTİV</p>
          <p class="brand-sub">Araç Muhasebe</p>
        </a>
        <nav class="nav">
          <a href="index.html" class="btn btn-ghost">Liste</a>
          <a href="yeni.html" class="btn btn-primary">Yeni araç</a>
        </nav>
      </div>
    </header>

    <main class="main">
      <section>
        <h1 class="page-title">Araç portföyü</h1>
        <p class="page-desc">
          Alış, satış ve masrafları yönetin; her araç için kar marjını görün.
        </p>
      </section>

      <div id="config-warning" class="alert alert-error hidden" style="margin-top: 1.25rem">
        Supabase ayarları eksik. <code>js/config.js</code> dosyasına proje URL ve anon key girin.
      </div>

      <section id="stats" class="stats"></section>

      <section>
        <div class="toolbar">
          <div class="filters" id="filters">
            <button type="button" class="filter-btn active" data-filter="all">Tümü</button>
            <button type="button" class="filter-btn" data-filter="stokta">Stokta</button>
            <button type="button" class="filter-btn" data-filter="satildi">Satıldı</button>
          </div>
          <input
            type="search"
            id="search"
            class="search"
            placeholder="Marka, model veya plaka ara…"
            enterkeyhint="search"
          />
        </div>

        <div id="loading" class="loading">Yükleniyor…</div>
        <div id="error" class="error-state hidden"></div>
        <div id="list-root"></div>
      </section>
    </main>

    <div class="mobile-bar">
      <a href="yeni.html" class="btn btn-primary">+ Yeni araç ekle</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/db.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
