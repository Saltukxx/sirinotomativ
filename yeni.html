<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#c45c26" />
    <title>Yeni araç — Şirin Otomotiv</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <style>
      html.auth-pending body {
        visibility: hidden;
      }
      html.auth-ready body {
        visibility: visible;
      }
    </style>
    <script src="js/auth-gate.js"></script>
  </head>
  <body>
    <header class="header">
      <div class="header-inner">
        <a href="index.html" class="brand">
          <p class="brand-name">ŞİRİN OTOMOTİV</p>
          <p class="brand-sub">Araç Muhasebe</p>
        </a>
        <nav class="nav">
          <span id="user-slot" class="user-slot"></span>
          <a href="index.html" class="btn btn-ghost">Liste</a>
          <a href="yeni.html" class="btn btn-primary">Yeni araç</a>
        </nav>
      </div>
    </header>

    <main class="main" style="max-width: 760px">
      <a href="index.html" class="back-link">← Portföye dön</a>
      <section>
        <h1 class="page-title">Yeni araç</h1>
        <p class="page-desc">
          Alış, satıcı, ödeme tipi ve fotoğraf bilgilerini girin.
        </p>
      </section>

      <form id="vehicle-form" class="panel form-panel">
        <div class="photo-upload">
          <div id="photo-preview" class="photo-preview placeholder">Fotoğraf yok</div>
          <div class="field" style="flex: 1">
            <label for="photo">Araç fotoğrafı</label>
            <input id="photo" name="photo" type="file" accept="image/*" />
            <p class="field-hint">JPG/PNG, en fazla 5 MB</p>
          </div>
        </div>

        <div class="form-grid two" style="margin-top: 1rem">
          <div class="field">
            <label for="brand">Marka</label>
            <input id="brand" name="brand" required placeholder="Örn. Volkswagen" autocomplete="off" />
          </div>
          <div class="field">
            <label for="model">Model</label>
            <input id="model" name="model" required placeholder="Örn. Golf 1.6 TDI" autocomplete="off" />
          </div>
          <div class="field">
            <label for="year">Model yılı</label>
            <input id="year" name="year" type="number" min="1980" max="2030" required inputmode="numeric" />
          </div>
          <div class="field">
            <label for="plate">Plaka</label>
            <input id="plate" name="plate" placeholder="34 ABC 123" autocomplete="off" />
          </div>
          <div class="field">
            <label for="purchase_price">Alış fiyatı (₺)</label>
            <input
              id="purchase_price"
              name="purchase_price"
              type="text"
              inputmode="numeric"
              required
              placeholder="Örn. 850000"
              autocomplete="off"
            />
          </div>
          <div class="field">
            <label for="purchase_date">Alış tarihi</label>
            <input id="purchase_date" name="purchase_date" type="date" required />
          </div>
          <div class="field">
            <label for="purchase_payment_type">Alış ödeme tipi</label>
            <select id="purchase_payment_type" name="purchase_payment_type"></select>
          </div>
          <div class="field">
            <label for="commission">Komisyon (₺)</label>
            <input
              id="commission"
              name="commission"
              type="text"
              inputmode="numeric"
              value="0"
              placeholder="0"
              autocomplete="off"
            />
          </div>
          <div class="field">
            <label for="vat_amount">KDV (₺)</label>
            <input
              id="vat_amount"
              name="vat_amount"
              type="text"
              inputmode="numeric"
              value="0"
              placeholder="0"
              autocomplete="off"
            />
          </div>
        </div>

        <h3 class="form-section-title">Satıcı bilgileri</h3>
        <div class="form-grid two">
          <div class="field">
            <label for="seller_name">Satıcı adı</label>
            <input id="seller_name" name="seller_name" placeholder="Kimden alındı" />
          </div>
          <div class="field">
            <label for="seller_phone">Satıcı telefon</label>
            <input id="seller_phone" name="seller_phone" placeholder="05xx xxx xx xx" inputmode="tel" />
          </div>
        </div>

        <div class="field" style="margin-top: 1rem">
          <label>Durum</label>
          <div class="status-toggle">
            <button type="button" id="status-stokta" class="active-stock" data-status="stokta">Stokta</button>
            <button type="button" id="status-satildi" data-status="satildi">Satıldı</button>
          </div>
          <input type="hidden" id="status" name="status" value="stokta" />
        </div>

        <div id="sale-fields" class="sale-fields hidden" style="margin-top: 1rem">
          <h3 class="form-section-title">Satış bilgileri</h3>
          <div class="form-grid two">
            <div class="field">
              <label for="sale_price">Satış fiyatı (₺)</label>
              <input
                id="sale_price"
                name="sale_price"
                type="text"
                inputmode="numeric"
                placeholder="Örn. 950000"
                autocomplete="off"
              />
            </div>
            <div class="field">
              <label for="sale_date">Satış tarihi</label>
              <input id="sale_date" name="sale_date" type="date" />
            </div>
            <div class="field">
              <label for="sale_payment_type">Satış ödeme tipi</label>
              <select id="sale_payment_type" name="sale_payment_type"></select>
            </div>
            <div class="field">
              <label for="buyer_name">Alıcı adı</label>
              <input id="buyer_name" name="buyer_name" placeholder="Kime satıldı" />
            </div>
            <div class="field">
              <label for="buyer_phone">Alıcı telefon</label>
              <input id="buyer_phone" name="buyer_phone" placeholder="05xx xxx xx xx" inputmode="tel" />
            </div>
          </div>
        </div>

        <div class="field" style="margin-top: 1rem">
          <label for="notes">Notlar</label>
          <textarea id="notes" name="notes" rows="3" placeholder="Opsiyonel notlar..."></textarea>
        </div>

        <div id="form-error" class="alert alert-error hidden" style="margin-top: 1rem"></div>

        <div class="form-actions" style="margin-top: 1.15rem">
          <button type="submit" class="btn btn-primary btn-block" id="submit-btn">Aracı kaydet</button>
          <a href="index.html" class="btn btn-ghost btn-block">İptal</a>
        </div>
      </form>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/db.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/yeni.js"></script>
  </body>
</html>
